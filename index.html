<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>보스게이트 (BOSS GATE)</title>
  <link rel="stylesheet" href="./style.css" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- ✅ style.css가 적용 안 되거나 일부가 날아가도 “검은 화면” 방지용 최소 CSS -->
  <style>
    html,body{height:100%;margin:0;background:#05070c;color:#fff;overflow:hidden;}
    #wrap{height:100%;display:flex;align-items:center;justify-content:center;}
    #stage{width:min(100vw,960px);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;}
    canvas{width:100%;height:100%;display:block;image-rendering:auto;background:#000;border-radius:12px;}

    /* Touch pad */
    #touch{
      position:fixed;left:0;right:0;bottom:0;
      height:180px;pointer-events:none;z-index:50;
    }
    #touch .btn{
      position:absolute;pointer-events:auto;user-select:none;
      background:rgba(10,14,24,.62);border:1px solid rgba(255,255,255,.18);
      color:rgba(235,240,255,.92);
      width:62px;height:62px;border-radius:16px;
      display:flex;align-items:center;justify-content:center;
      font:900 18px system-ui,-apple-system,Segoe UI,Roboto;
      backdrop-filter: blur(6px);
      touch-action:none;
    }
    #b-left{left:18px;bottom:24px;}
    #b-right{left:92px;bottom:24px;}
    #b-jump{right:178px;bottom:24px;}
    #b-atk{right:92px;bottom:24px;}
    #b-skill{right:18px;bottom:24px;}
    #b-potion{right:18px;bottom:98px;}
    #b-inv{left:18px;bottom:98px;}
    #b-menu{left:92px;bottom:98px;}

    @media (min-width: 980px){
      #touch{display:none;}
    }
  </style>
</head>

<body>
  <div id="wrap">
    <div id="stage">
      <canvas id="game" width="960" height="540"></canvas>
    </div>
  </div>

  <!-- ✅ 터치 버튼(뷰포트 fixed) -->
  <div id="touch" aria-hidden="true">
    <div class="btn" id="b-left" data-k="left">◀</div>
    <div class="btn" id="b-right" data-k="right">▶</div>

    <div class="btn" id="b-jump" data-k="jump">⤒</div>
    <div class="btn" id="b-potion" data-k="potion">🧪</div>
    <div class="btn" id="b-atk" data-k="atk">Z</div>
    <div class="btn" id="b-skill" data-k="skill">X</div>

    <div class="btn" id="b-inv" data-k="inv">🎒</div>
    <div class="btn" id="b-menu" data-k="menu">⚙</div>
  </div>

<script src="./game.js?v=rpg-20260306-noplatform"></script>
</body>
</html>
